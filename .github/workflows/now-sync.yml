name: Sync now.md into README

on:
  workflow_dispatch:
  push:
    paths:
      - 'now.md'

jobs:
  sync-now:
    name: Inject now.md content into README
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject now.md into README NOW section
        run: python3 inject_now.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: sync /now page [skip ci]"
          git push
