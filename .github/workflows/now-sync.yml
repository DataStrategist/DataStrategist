name: Sync now.md into README

on:
  workflow_dispatch:
  # To trigger: update now.md in this repo, then run this workflow manually
  # (or it will pick up on the next push that changes now.md via push trigger)
  push:
    paths:
      - 'now.md'

jobs:
  sync-now:
    name: Inject now.md content into README
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject now.md into README NOW section
        run: |
          cat > inject_now.py << 'PYEOF'
import re

now_content = open("now.md", encoding="utf-8").read().strip()
readme = open("README.md", encoding="utf-8").read()
new_block = "<!-- NOW:START -->\n" + now_content + "\n<!-- NOW:END -->"
updated = re.sub(
    r"<!-- NOW:START -->.*?<!-- NOW:END -->",
    new_block,
    readme,
    flags=re.DOTALL,
)
open("README.md", "w", encoding="utf-8").write(updated)
print("Done.")
PYEOF
          python3 inject_now.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: sync /now page [skip ci]"
          git push
